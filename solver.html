<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Essence Solver | Arknights: Endfield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- LINK TO MASTER WEAPON DATABASE JS FILE -->
  <script src="weaponDatabase.js"></script>
  <style>
    :root {
      --bg-dark: #090d12;
      --card-bg: #0d1117;
      --accent-cyan: #00F0FF;
      --accent-yellow: #FFB800;
      --border-color: rgba(0, 240, 255, 0.25);
    }
    body {
      background-color: var(--bg-dark);
      color: #f0f6fc;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .hud-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    }
    .hud-card:hover {
      border-color: var(--accent-cyan);
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto space-y-6">
    
    <!-- Top Navigation -->
    <nav class="flex justify-between items-center p-4 hud-card bg-[#0d1117]">
      <div class="text-xl font-black text-[#00F0FF] tracking-wider">ESSENCE SOLVER</div>
      <div class="flex gap-6 font-bold text-sm">
        <a href="index.html" class="hover:text-[#00F0FF] transition-colors">Home</a>
        <a href="solver.html" class="text-[#00F0FF]">Solver Tool</a>
        <a href="videos.html" class="hover:text-[#00F0FF] transition-colors">Video Guides</a>
      </div>
    </nav>

    <!-- Header Banner -->
    <header class="hud-card p-6 relative">
      <div class="text-[#FFB800] text-xs font-bold tracking-widest mb-1">// WEAPON ESSENCE MATCHING</div>
      <h1 class="text-2xl md:text-3xl font-black text-white tracking-wide">ENERGY ALLUVIUM LOCATOR</h1>
      <p class="text-gray-400 text-xs mt-1">Filter by weapon type, stat attributes, or search by weapon name to find matching weapons and farming locations.</p>
    </header>

    <!-- Controls Section -->
    <section class="hud-card p-6 space-y-6">
      
      <!-- Weapon Search & Type Filter -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Search Weapon Name</label>
          <input type="text" id="weaponSearch" placeholder="Type weapon name (e.g., Valley Cleaver)..." oninput="filterLocations()" class="w-full bg-[#05080c] border border-gray-700 text-white p-3 text-sm focus:border-[#00F0FF] focus:outline-none font-semibold">
        </div>
        <div>
          <label class="block text-xs font-bold text-[#FFB800] mb-2 uppercase tracking-wider">Weapon Type (5 Types)</label>
          <select id="typeFilter" onchange="filterLocations()" class="w-full bg-[#05080c] border border-gray-700 text-white p-3 text-sm focus:border-[#FFB800] focus:outline-none font-semibold">
            <option value="any">All Weapon Types</option>
            <option value="Sword">Sword</option>
            <option value="Greatsword">Greatsword</option>
            <option value="Polearm">Polearm</option>
            <option value="Handcannon">Handcannon</option>
            <option value="Arts Unit">Arts Unit</option>
          </select>
        </div>
      </div>

      <!-- 3 Category Attribute Dropdowns -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <!-- 1. Attribute Stat Dropdown -->
        <div>
          <label class="block text-xs font-bold text-[#00F0FF] mb-2 uppercase tracking-wider flex items-center gap-1.5">
            <span class="w-2 h-2 bg-[#00F0FF] inline-block"></span>
            1. Attribute Stat
          </label>
          <select id="attrStat" onchange="filterLocations()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2.5 text-xs focus:border-[#00F0FF] focus:outline-none">
            <option value="any">Any Attribute Stat</option>
            <option value="Agility">Agility Boost</option>
            <option value="Strength">Strength Boost</option>
            <option value="Will">Will Boost</option>
            <option value="Intellect">Intellect Boost</option>
            <option value="Main Attribute">Main Attribute Boost</option>
          </select>
        </div>

        <!-- 2. Secondary Stat Dropdown -->
        <div>
          <label class="block text-xs font-bold text-[#FFB800] mb-2 uppercase tracking-wider flex items-center gap-1.5">
            <span class="w-2 h-2 bg-[#FFB800] inline-block"></span>
            2. Secondary Stat
          </label>
          <select id="secStat" onchange="filterLocations()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2.5 text-xs focus:border-[#FFB800] focus:outline-none">
            <option value="any">Any Secondary Stat</option>
            <option value="Attack">Attack Boost</option>
            <option value="HP">HP Boost</option>
            <option value="Physical">Physical DMG Boost</option>
            <option value="Heat">Heat DMG Boost</option>
            <option value="Electric">Electric DMG Boost</option>
            <option value="Cryo">Cryo DMG Boost</option>
            <option value="Nature">Nature DMG Boost</option>
            <option value="Critical">Critical Rate Boost</option>
            <option value="Arts Intensity">Arts Intensity Boost</option>
            <option value="Arts DMG">Arts DMG Boost</option>
            <option value="Ultimate Energy">Ultimate Energy Gain Boost</option>
            <option value="Treatment">Treatment Efficiency Boost</option>
          </select>
        </div>

        <!-- 3. Skill Stat Dropdown -->
        <div>
          <label class="block text-xs font-bold text-[#00F0FF] mb-2 uppercase tracking-wider flex items-center gap-1.5">
            <span class="w-2 h-2 bg-[#00F0FF] inline-block"></span>
            3. Skill Stat
          </label>
          <select id="skillStat" onchange="filterLocations()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2.5 text-xs focus:border-[#00F0FF] focus:outline-none">
            <option value="any">Any Skill Stat</option>
            <option value="Assault">Assault</option>
            <option value="Suppression">Suppression</option>
            <option value="Pursuit">Pursuit</option>
            <option value="Crusher">Crusher</option>
            <option value="Combative">Combative</option>
            <option value="Detonate">Detonate</option>
            <option value="Flow">Flow</option>
            <option value="Efficacy">Efficacy</option>
            <option value="Inspiring">Inspiring</option>
            <option value="Infliction">Infliction</option>
            <option value="Medicant">Medicant</option>
            <option value="Fracture">Fracture</option>
            <option value="Brutality">Brutality</option>
            <option value="Twilight">Twilight</option>
          </select>
        </div>

      </div>

    </section>

    <!-- SECTION A: MATCHING WEAPONS RESULTS -->
    <section class="hud-card p-6 border-t-2 border-[#FFB800]">
      <h2 class="text-sm font-bold text-[#FFB800] mb-4 uppercase tracking-wider flex items-center gap-2">
        <span>// MATCHING WEAPONS</span>
      </h2>
      <div id="matchingWeaponsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        <!-- Weapon cards render here -->
      </div>
    </section>

    <!-- SECTION B: MATCHING ALLUVIUM LOCATIONS RESULTS -->
    <section class="hud-card p-6 border-t-2 border-[#00F0FF]">
      <h2 class="text-sm font-bold text-[#00F0FF] mb-4 uppercase tracking-wider flex items-center gap-2">
        <span>// MATCHING ENERGY ALLUVIUM LOCATIONS</span>
      </h2>
      <div id="resultsList" class="space-y-3">
        <!-- Matching location cards render here -->
      </div>
    </section>

  </div>

  <script>
    // 11 Verified Energy Alluvium farming locations
    const alluviumLocations = [
      { name: "The Hub", zone: "The Hub", secondaryStats: ["Attack Boost", "HP Boost"], skillStats: ["Assault", "Suppression", "Pursuit", "Crusher", "Combative", "Detonate", "Flow", "Efficacy"] },
      { name: "Originium Science Park", zone: "Originium Science Park", secondaryStats: ["Physical DMG Boost", "Critical Rate Boost"], skillStats: ["Suppression", "Pursuit", "Inspiring", "Combative", "Infliction", "Medicant", "Fracture", "Efficacy"] },
      { name: "Origin Lodesprings", zone: "Origin Lodesprings", secondaryStats: ["HP Boost", "Physical DMG Boost", "Heat DMG Boost", "Cryo DMG Boost", "Nature DMG Boost", "Critical Rate Boost", "Treatment Efficiency Boost"], skillStats: ["Assault", "Suppression", "Combative", "Brutality", "Infliction", "Detonate", "Twilight", "Efficacy"] },
      { name: "Power Plateau", zone: "Power Plateau", secondaryStats: ["HP Boost", "Physical DMG Boost", "Heat DMG Boost", "Nature DMG Boost", "Critical Rate Boost", "Treatment Efficiency Boost"], skillStats: ["Pursuit", "Crusher", "Inspiring", "Brutality", "Infliction", "Medicant", "Fracture", "Flow"] },
      { name: "Wuling City", zone: "Wuling City", secondaryStats: ["HP Boost", "Electric DMG Boost", "Cryo DMG Boost", "Critical Rate Boost", "Ultimate Energy Gain Boost", "Arts DMG Boost", "Treatment Efficiency Boost"], skillStats: ["Assault", "Crusher", "Brutality", "Medicant", "Fracture", "Detonate", "Twilight", "Flow"] },
      { name: "Qingbo Stockade", zone: "Qingbo Stockade", secondaryStats: ["HP Boost", "Physical DMG Boost", "Electric DMG Boost", "Cryo DMG Boost", "Arts Intensity Boost", "Ultimate Energy Gain Boost", "Arts DMG Boost", "Treatment Efficiency Boost"], skillStats: ["Suppression", "Crusher", "Inspiring", "Combative", "Medicant", "Fracture", "Detonate", "Twilight"] },
      { name: "Marker Stone", zone: "Marker Stone", secondaryStats: ["Attack Boost", "Physical DMG Boost", "Heat DMG Boost", "Electric DMG Boost", "Nature DMG Boost", "Critical Rate Boost", "Ultimate Energy Gain Boost", "Arts DMG Boost"], skillStats: ["Assault", "Pursuit", "Inspiring", "Brutality", "Infliction", "Twilight", "Flow", "Efficacy"] },
      { name: "Test Area", zone: "Test Area", secondaryStats: ["HP Boost", "Heat DMG Boost", "Electric DMG Boost", "Cryo DMG Boost", "Nature DMG Boost", "Arts Intensity Boost", "Ultimate Energy Gain Boost", "Treatment Efficiency Boost"], skillStats: ["Suppression", "Crusher", "Combative", "Brutality", "Infliction", "Fracture", "Twilight", "Flow"] },
      { name: "Sword Vault Dale", zone: "Sword Vault Dale", secondaryStats: ["Attack Boost", "HP Boost", "Physical DMG Boost", "Heat DMG Boost", "Cryo DMG Boost", "Nature DMG Boost", "Arts Intensity Boost", "Treatment Efficiency Boost"], skillStats: ["Assault", "Pursuit", "Inspiring", "Combative", "Medicant", "Fracture", "Detonate", "Efficacy"] },
      { name: "Yinglung Pass", zone: "Yinglung Pass", secondaryStats: ["Attack Boost", "Physical DMG Boost", "Electric DMG Boost", "Cryo DMG Boost", "Nature DMG Boost", "Critical Rate Boost", "Arts Intensity Boost", "Arts DMG Boost"], skillStats: ["Suppression", "Pursuit", "Combative", "Brutality", "Infliction", "Detonate", "Flow", "Efficacy"] },
      { name: "North Wuling EZ", zone: "North Wuling EZ", secondaryStats: ["HP Boost", "Physical DMG Boost", "Heat DMG Boost", "Nature DMG Boost", "Critical Rate Boost", "Arts Intensity Boost", "Arts DMG Boost", "Treatment Efficiency Boost"], skillStats: ["Assault", "Suppression", "Pursuit", "Crusher", "Inspiring", "Infliction", "Medicant", "Efficacy"] }
    ];

    const locationIconSVG = `
      <svg class="w-6 h-6 text-[#00F0FF] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    `;

    // Helper function to check if target search value matches item (string or array) flexibly
    function isFlexibleMatch(target, searchVal) {
      if (!searchVal || searchVal === "any") return true;
      const lowerSearch = searchVal.toLowerCase();

      if (Array.isArray(target)) {
        return target.some(item => String(item).toLowerCase().includes(lowerSearch));
      }
      if (typeof target === 'string') {
        return target.toLowerCase().includes(lowerSearch);
      }
      return false;
    }

    function filterLocations() {
      const searchVal = document.getElementById('weaponSearch').value.toLowerCase();
      const typeVal = document.getElementById('typeFilter').value;
      const attr = document.getElementById('attrStat').value;
      const sec = document.getElementById('secStat').value;
      const skill = document.getElementById('skillStat').value;

      const weaponsContainer = document.getElementById('matchingWeaponsList');
      const locationsContainer = document.getElementById('resultsList');
      
      weaponsContainer.innerHTML = "";
      locationsContainer.innerHTML = "";

      let dataset = [];
      if (typeof weaponDatabase !== 'undefined') dataset = weaponDatabase;
      else if (typeof window.weaponDatabase !== 'undefined') dataset = window.weaponDatabase;
      else if (typeof masterWeapons !== 'undefined') dataset = masterWeapons;
      else if (typeof weapons !== 'undefined') dataset = weapons;

      let matchingWeapons = [];

      if (dataset.length === 0) {
        weaponsContainer.innerHTML = `<span class="text-xs text-red-400 font-semibold col-span-3">Could not load weapon dataset. Check weaponDatabase.js format.</span>`;
      } else {
        // Filter matching weapons using flexible case-insensitive substring checks
        matchingWeapons = dataset.filter(w => {
          const wName = w.name || w.weaponName || w.title || "";
          const wType = w.type || w.category || w.weaponType || "";
          
          const wAttr = w.attributes || w.primaryStat || w.attr || w.attribute || [];
          const wSec = w.secondaryStats || w.secondaryStat || w.sec || [];
          const wSkill = w.skillStats || w.skillStat || w.skill || [];

          const nameMatch = searchVal === "" || wName.toLowerCase().includes(searchVal);
          const typeMatch = typeVal === "any" || wType.toLowerCase() === typeVal.toLowerCase();
          
          const attrMatch = isFlexibleMatch(wAttr, attr);
          const secMatch = isFlexibleMatch(wSec, sec);
          const skillMatch = isFlexibleMatch(wSkill, skill);

          return nameMatch && typeMatch && attrMatch && secMatch && skillMatch;
        });

        if (matchingWeapons.length === 0) {
          weaponsContainer.innerHTML = `<span class="text-xs text-gray-500 font-semibold col-span-3">No matching weapons found for selected filters.</span>`;
        } else {
          matchingWeapons.forEach(w => {
            const wName = w.name || w.weaponName || w.title || "Unknown Weapon";
            const locName = w.location || w.farmingLocation || w.zone || "Energy Alluvium Node";
            const wType = w.type || w.category || w.weaponType || "Weapon";

            weaponsContainer.innerHTML += `
              <div class="bg-[#05080c] border border-[#FFB800]/50 p-3 flex justify-between items-center">
                <div>
                  <div class="text-white font-bold text-xs">${wName}</div>
                  <div class="text-[10px] text-gray-400 mt-0.5">Location: <span class="text-[#00F0FF]">${locName}</span></div>
                </div>
                <span class="bg-[#FFB800]/10 text-[#FFB800] border border-[#FFB800]/40 text-[9px] font-bold px-1.5 py-0.5 uppercase">
                  ${wType}
                </span>
              </div>
            `;
          });
        }
      }

      // Filter Energy Alluvium locations flexible match
      const matchingLocationNames = new Set(matchingWeapons.map(w => w.location || w.farmingLocation || w.zone));
      const filteredLocations = alluviumLocations.filter(loc => {
        const matchesSec = isFlexibleMatch(loc.secondaryStats, sec);
        const matchesSkill = isFlexibleMatch(loc.skillStats, skill);
        const matchesWeaponLoc = matchingWeapons.length === 0 || matchingLocationNames.has(loc.name);
        return matchesSec && matchesSkill && matchesWeaponLoc;
      });

      if (filteredLocations.length === 0) {
        locationsContainer.innerHTML = `
          <div class="bg-[#05080c] p-6 text-center text-gray-500 text-xs font-bold uppercase tracking-wider">
            No matching Energy Alluvium locations found for this criteria.
          </div>
        `;
        return;
      }

      filteredLocations.forEach(loc => {
        const secText = loc.secondaryStats.length > 0 ? loc.secondaryStats.join(', ') : 'None';
        locationsContainer.innerHTML += `
          <div class="bg-[#05080c] p-4 border-l-4 border-[#00F0FF] flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              ${locationIconSVG}
              <div>
                <div class="text-white font-bold text-sm">${loc.name}</div>
                <div class="text-[11px] text-gray-400 mt-1">
                  <strong class="text-gray-300">Secondary Stats:</strong> ${secText}
                </div>
              </div>
            </div>
            <div class="text-right">
              <span class="bg-[#00F0FF]/10 text-[#00F0FF] border border-[#00F0FF]/40 text-[10px] font-bold px-2 py-1 uppercase">
                ${loc.zone}
              </span>
            </div>
          </div>
        `;
      });
    }

    document.addEventListener('DOMContentLoaded', filterLocations);
  </script>

</body>
</html>
