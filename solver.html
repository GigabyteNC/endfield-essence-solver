<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Essence Solver & Location Finder | Arknights: Endfield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-dark: #090d12;
      --card-bg: #0d1117;
      --accent-cyan: #00F0FF;
      --accent-yellow: #FFB800;
      --border-color: rgba(0, 240, 255, 0.25);
    }
    body {
      background-color: var(--bg-dark);
      color: #f0f6fc;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .hud-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    }
    .hud-card:hover {
      border-color: var(--accent-cyan);
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    
    <!-- Multi-Page Navigation Bar -->
    <nav class="flex justify-between items-center p-4 mb-8 hud-card bg-[#0d1117]">
      <div class="text-xl font-black text-[#00F0FF] tracking-wider">ESSENCE SOLVER</div>
      <div class="flex gap-6 font-bold text-sm">
        <a href="index.html" class="hover:text-[#00F0FF] transition-colors">Home</a>
        <a href="solver.html" class="text-[#00F0FF]">Solver Tool</a>
        <a href="videos.html" class="hover:text-[#00F0FF] transition-colors">Video Guides</a>
      </div>
    </nav>

    <!-- Header Banner -->
    <header class="hud-card p-6 md:p-8 mb-8 relative">
      <div class="text-[#FFB800] text-xs font-bold tracking-widest mb-1">// WEAPON & ESSENCE LOCATION FINDER</div>
      <h1 class="text-3xl md:text-4xl font-black text-white tracking-wide mb-2">ESSENCE SEARCH & SOLVER</h1>
      <p class="text-gray-400 text-sm max-w-2xl">
        Search weapons by attributes or names to locate matching Essence nodes, target drop locations, and operator synergies.
      </p>
    </header>

    <!-- Controls & Attribute Filters -->
    <section class="hud-card p-6 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Search Weapon, Essence, or Location</label>
          <input type="text" id="searchInput" placeholder="Search (e.g., Lifeng, Energy Alluvium, Valley, Corrosion)..." oninput="renderWeapons()" class="w-full bg-[#05080c] border border-gray-700 text-white p-3 focus:border-[#00F0FF] focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Filter Attribute</label>
          <select id="attributeFilter" onchange="renderWeapons()" class="w-full bg-[#05080c] border border-gray-700 text-white p-3 focus:border-[#00F0FF] focus:outline-none">
            <option value="all">All Attributes</option>
            <option value="Physical">Physical</option>
            <option value="Corrosion">Corrosion</option>
            <option value="Energy">Energy / Recharge</option>
            <option value="Crit">Crit Rate / Dmg</option>
          </select>
        </div>
      </div>

      <!-- Attribute Quick Filter Buttons -->
      <div class="flex flex-wrap gap-2 text-xs">
        <button onclick="setQuickFilter('all')" class="bg-gray-800 hover:bg-[#00F0FF] hover:text-black text-white font-bold px-3 py-1.5 transition-colors">ALL WEAPONS</button>
        <button onclick="setQuickFilter('Corrosion')" class="bg-gray-800 hover:bg-[#FFB800] hover:text-black text-white font-bold px-3 py-1.5 transition-colors">CORROSION ATTRIBUTES</button>
        <button onclick="setQuickFilter('Energy')" class="bg-gray-800 hover:bg-[#00F0FF] hover:text-black text-white font-bold px-3 py-1.5 transition-colors">ENERGY ALLUVIUM</button>
        <button onclick="setQuickFilter('Crit')" class="bg-gray-800 hover:bg-[#FFB800] hover:text-black text-white font-bold px-3 py-1.5 transition-colors">CRIT RATE/DMG</button>
      </div>
    </section>

    <!-- Main Dynamic Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Matching Results Container -->
      <div class="lg:col-span-2 space-y-4" id="resultsList">
        <!-- Rendered dynamically by JavaScript -->
      </div>

      <!-- Quick Calculator / Threshold Summary Panel -->
      <div class="hud-card p-6 h-fit">
        <h3 class="text-sm font-black text-[#00F0FF] tracking-wider mb-4 uppercase">// ROTATION CALCULATOR</h3>
        
        <div class="space-y-4 text-xs font-bold text-gray-400">
          <div>
            <label class="block mb-1">BASE ATTACK</label>
            <input type="number" id="baseAtk" value="2450" oninput="runCalc()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2 focus:border-[#00F0FF] focus:outline-none">
          </div>
          <div>
            <label class="block mb-1">CRIT RATE (%)</label>
            <input type="number" id="critRate" value="65" oninput="runCalc()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2 focus:border-[#00F0FF] focus:outline-none">
          </div>
          <div>
            <label class="block mb-1">CRIT DAMAGE (%)</label>
            <input type="number" id="critDmg" value="180" oninput="runCalc()" class="w-full bg-[#05080c] border border-gray-700 text-white p-2 focus:border-[#00F0FF] focus:outline-none">
          </div>
        </div>

        <div class="mt-6 p-4 bg-[#05080c] border-l-4 border-[#FFB800]">
          <div class="text-[10px] text-gray-400 tracking-widest font-bold">ESTIMATED ROTATION PEAK</div>
          <div id="outputVal" class="text-2xl font-black text-[#FFB800] mt-1">953,981</div>
        </div>
      </div>

    </div>
  </div>

  <!-- JavaScript Search Engine & Database -->
  <script>
    // Full Weapon Database with Attributes, Essence Nodes, Locations, and Operator Synergies
    const weaponDatabase = [
      {
        id: "wpn-01",
        name: "Valley Cleaver",
        type: "Sword",
        rarity: "5-Star",
        attributes: ["Energy", "Physical"],
        essenceNode: "Energy Alluvium Node 04",
        location: "Valley Outpost - Sector 2 Rift",
        operator: "Lifeng",
        statBonus: "+25.0% Skill Multiplier",
        description: "Optimized for fast skill rotations and energy regen."
      },
      {
        id: "wpn-02",
        name: "Corrosion Edge",
        type: "Greatsword",
        rarity: "5-Star",
        attributes: ["Corrosion", "Physical"],
        essenceNode: "Corrosion Threshold Enhancer",
        location: "Corrosion Quarry - Zone B",
        operator: "Chen Qianyu",
        statBonus: "+45.0% Corrosion Scaling",
        description: "Applies heavy defense shreds and elemental debuffs."
      },
      {
        id: "wpn-03",
        name: "Budget Peak Blade",
        type: "Sword",
        rarity: "4-Star",
        attributes: ["Crit", "Physical"],
        essenceNode: "Budget Peak Rotation Core",
        location: "Central Ruins - Node 01",
        operator: "Akekuri",
        statBonus: "953,981 Damage Benchmark",
        description: "Maximizes output efficiency with minimal resource investment."
      },
      {
        id: "wpn-04",
        name: "Alluvium Staff",
        type: "Staff",
        rarity: "5-Star",
        attributes: ["Energy", "Crit"],
        essenceNode: "Alluvium Resonance Core",
        location: "Highland Spire - Sector 4",
        operator: "Camille",
        statBonus: "+18.5% Energy Recharge",
        description: "Accelerates skill cooldowns for sustained team combat loops."
      }
    ];

    function renderWeapons() {
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      const attrFilter = document.getElementById('attributeFilter').value;
      const container = document.getElementById('resultsList');
      
      container.innerHTML = "";

      const filtered = weaponDatabase.filter(item => {
        const matchesSearch = 
          item.name.toLowerCase().includes(searchVal) ||
          item.essenceNode.toLowerCase().includes(searchVal) ||
          item.location.toLowerCase().includes(searchVal) ||
          item.operator.toLowerCase().includes(searchVal) ||
          item.type.toLowerCase().includes(searchVal);

        const matchesAttr = attrFilter === "all" || item.attributes.includes(attrFilter);

        return matchesSearch && matchesAttr;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="hud-card p-6 text-center text-gray-400">
            No matching weapons, essence nodes, or locations found.
          </div>
        `;
        return;
      }

      filtered.forEach(item => {
        const attrTags = item.attributes.map(attr => 
          `<span class="bg-[#00F0FF]/10 text-[#00F0FF] border border-[#00F0FF] text-[10px] font-bold px-2 py-0.5">${attr}</span>`
        ).join(" ");

        container.innerHTML += `
          <div class="hud-card p-5 space-y-3">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-xs font-bold text-[#FFB800] tracking-wider">${item.rarity} // ${item.type.toUpperCase()}</span>
                <h3 class="text-xl font-black text-white">${item.name}</h3>
              </div>
              <div class="flex gap-1">${attrTags}</div>
            </div>

            <p class="text-sm text-gray-400">${item.description}</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs bg-[#05080c] p-3 border-l-2 border-[#00F0FF]">
              <div><strong class="text-white">ESSENCE NODE:</strong> ${item.essenceNode}</div>
              <div><strong class="text-[#FFB800]">LOCATION:</strong> ${item.location}</div>
              <div><strong class="text-white">SYNERGY OPERATOR:</strong> ${item.operator}</div>
              <div><strong class="text-white">EFFECT:</strong> ${item.statBonus}</div>
            </div>
          </div>
        `;
      });
    }

    function setQuickFilter(attr) {
      document.getElementById('attributeFilter').value = attr;
      renderWeapons();
    }

    function runCalc() {
      const atk = parseFloat(document.getElementById('baseAtk').value) || 0;
      const rate = (parseFloat(document.getElementById('critRate').value) || 0) / 100;
      const cdmg = (parseFloat(document.getElementById('critDmg').value) || 0) / 100;
      
      const peak = atk * 3.8 * (1 + cdmg) * 1.45;
      document.getElementById('outputVal').innerText = Math.round(peak).toLocaleString();
    }

    // Initial Render on Page Load
    renderWeapons();
  </script>
</body>
</html>
