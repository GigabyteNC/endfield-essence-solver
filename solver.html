<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Essence Solver Tool | Arknights: Endfield</title>
  <style>
    :root {
      --bg-dark: #090d12;
      --card-bg: #0d1117;
      --accent-cyan: #00F0FF;
      --accent-yellow: #FFB800;
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
      --border-color: rgba(0, 240, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      padding: 20px 16px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      margin-bottom: 30px;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent-cyan);
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--accent-cyan); }

    /* Tool Workspace Grid */
    .solver-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .solver-grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 24px;
      position: relative;
    }

    .panel-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent-cyan);
      margin-bottom: 18px;
      letter-spacing: 1.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 10px;
      background-color: #05080c;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.95rem;
      outline: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--accent-cyan);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* Results Dashboard */
    .result-box {
      background: rgba(0, 0, 0, 0.4);
      border-left: 4px solid var(--accent-yellow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .result-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    .result-value {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-yellow);
      letter-spacing: 1px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    .stat-row span:last-child {
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .calc-btn {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-cyan);
      color: #000;
      border: none;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    .calc-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Navigation -->
    <nav>
      <div class="nav-brand">ESSENCE SOLVER</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="solver.html" class="active">Solver Tool</a>
        <a href="videos.html">Video Guides</a>
      </div>
    </nav>

    <!-- Solver Interface -->
    <div class="solver-grid">
      
      <!-- Input Parameters Panel -->
      <div class="panel">
        <div class="panel-title">
          <span>// LOADOUT PARAMETERS</span>
        </div>

        <div class="form-group">
          <label for="operatorSelect">TEAM LEAD OPERATOR</label>
          <select id="operatorSelect" onchange="calculateDamage()">
            <option value="lifeng">Lifeng (Energy Alluvium Build)</option>
            <option value="akekuri">Akekuri (Budget Peak Build)</option>
            <option value="chen">Chen Qianyu (Corrosion Trigger)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="baseAtk">BASE ATTACK STAT</label>
          <input type="number" id="baseAtk" value="2450" oninput="calculateDamage()" />
        </div>

        <div class="form-group">
          <label for="critRate">CRIT RATE (%)</label>
          <input type="number" id="critRate" value="65" oninput="calculateDamage()" />
        </div>

        <div class="form-group">
          <label for="critDmg">CRIT DAMAGE (%)</label>
          <input type="number" id="critDmg" value="180" oninput="calculateDamage()" />
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="corrosionActive" checked onchange="calculateDamage()" />
            <label for="corrosionActive" style="margin-bottom: 0;">CORROSION MULTIPLIER ACTIVE</label>
          </div>
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="node04Active" checked onchange="calculateDamage()" />
            <label for="node04Active" style="margin-bottom: 0;">ALLUVIUM NODE 04 SYNCHRONIZED</label>
          </div>
        </div>
      </div>

      <!-- Output / Results Panel -->
      <div class="panel">
        <div class="panel-title">
          <span>// ROTATION OUTPUT</span>
        </div>

        <div class="result-box">
          <div class="result-label">ESTIMATED ROTATION PEAK</div>
          <div class="result-value" id="peakOutput">953,981</div>
        </div>

        <div class="stat-row">
          <span>Skill Damage Multiplier</span>
          <span id="skillMult">340%</span>
        </div>
        <div class="stat-row">
          <span>Corrosion Debuff Bonus</span>
          <span id="corrosionBonus">+45.0%</span>
        </div>
        <div class="stat-row">
          <span>Average Expected Output</span>
          <span id="avgOutput">715,485</span>
        </div>

        <button class="calc-btn" onclick="calculateDamage()">RE-SOLVE ROTATION</button>
      </div>

    </div>
  </div>

  <script>
    function calculateDamage() {
      const op = document.getElementById('operatorSelect').value;
      const baseAtk = parseFloat(document.getElementById('baseAtk').value) || 0;
      const critRate = Math.min(100, Math.max(0, parseFloat(document.getElementById('critRate').value) || 0)) / 100;
      const critDmg = (parseFloat(document.getElementById('critDmg').value) || 0) / 100;
      const hasCorrosion = document.getElementById('corrosionActive').checked;
      const hasNode04 = document.getElementById('node04Active').checked;

      // Base Operator Scaling Multipliers
      let opMult = 3.4; // Lifeng baseline
      if (op === 'akekuri') opMult = 3.8;
      if (op === 'chen') opMult = 3.1;

      // Modifiers
      let corrosionMult = hasCorrosion ? 1.45 : 1.0;
      let nodeMult = hasNode04 ? 1.25 : 1.0;

      // Calculate Peak (Max Crit) & Average
      let baseSkillDmg = baseAtk * opMult * nodeMult;
      let peakDmg = baseSkillDmg * (1 + critDmg) * corrosionMult;
      let avgDmg = baseSkillDmg * (1 + (critRate * critDmg)) * corrosionMult;

      // Format & Display Outputs
      document.getElementById('peakOutput').innerText = Math.round(peakDmg).toLocaleString();
      document.getElementById('avgOutput').innerText = Math.round(avgDmg).toLocaleString();
      document.getElementById('skillMult').innerText = (opMult * 100).toFixed(0) + '%';
      document.getElementById('corrosionBonus').innerText = hasCorrosion ? '+45.0%' : '+0.0%';
    }

    // Initial calculation on load
    calculateDamage();
  </script>
</body>
</html>
